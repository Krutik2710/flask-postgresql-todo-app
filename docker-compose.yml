version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: todo-postgres

    environment:
      POSTGRES_DB: todo_db
      POSTGRES_USER: todo_user
      POSTGRES_PASSWORD: todo123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  flask-app:
    build: .

    container_name: flask-todo

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql://todo_user:todo123@postgres:5432/todo_db

    depends_on:
      - postgres
  nginx:
    image: nginx:latest
    container_name: todo-nginx

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      - flask-app

volumes:
  postgres_data: