name: Build, Push and Update Manifest

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate Version
        id: version
        run: |
          VERSION=$(printf "v%03d" ${{ github.run_number }})
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Generated Version: $VERSION"

      - name: Build Docker Image
        run: |
          docker build \
            -t krutik2710/flask-postgresql-todo-app:${VERSION} .

      - name: Push Docker Image
        run: |
          docker push krutik2710/flask-postgresql-todo-app:${VERSION}

      - name: Update Kubernetes Deployment
        run: |
          sed -i "s|image: krutik2710/flask-postgresql-todo-app:.*|image: krutik2710/flask-postgresql-todo-app:${VERSION}|g" k8s/app/flask-deployment.yaml

      - name: Commit Updated Manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add k8s/app/flask-deployment.yaml

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update image to ${VERSION} [skip ci]"
          git push