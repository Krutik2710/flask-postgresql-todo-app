apiVersion: apps/v1
kind: Deployment

metadata:
  name: postgres
  namespace: todo-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      containers:
      - name: postgres
        image: postgres:16

        ports:
        - containerPort: 5432

        envFrom:
        - secretRef:
            name: postgres-secret

        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"

          limits:
            cpu: "1"
            memory: "1Gi"

      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc