apiVersion: apps/v1
kind: Deployment

metadata:
  name: flask-app
  namespace: todo-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: flask-app

  template:
    metadata:
      labels:
        app: flask-app

    spec:
      containers:
      - name: flask-app

        image: krutik2710/flask-postgresql-todo-app:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 8000

        envFrom:
        - secretRef:
            name: postgres-secret

        env:
        - name: POSTGRES_HOST
          value: postgres

        - name: POSTGRES_PORT
          value: "5432"